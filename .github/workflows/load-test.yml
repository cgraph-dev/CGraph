name: Load Tests

on:
  # Smoke test on PRs to staging
  pull_request:
    branches: [staging, main]
    paths:
      - 'apps/backend/**'
      - 'infrastructure/load-tests/**'

  # Weekly load test
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC

  # Manual trigger for any test type
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress

env:
  BASE_URL: ${{ secrets.STAGING_URL || 'https://staging.cgraph.org' }}
  WS_URL: ${{ secrets.STAGING_WS_URL || 'wss://staging.cgraph.org/socket/websocket' }}

jobs:
  smoke-test:
    name: Smoke Test (10 VUs, 60s)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'smoke')

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Smoke Test
        run: |
          mkdir -p results
          k6 run infrastructure/load-tests/k6/smoke.js \
            --env BASE_URL=${{ env.BASE_URL }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: results/
          retention-days: 30

  load-test:
    name: Load Test (100 VUs, 5min)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'load')

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Load Test
        run: |
          mkdir -p results
          k6 run infrastructure/load-tests/k6/load.js \
            --env BASE_URL=${{ env.BASE_URL }} \
            --env WS_URL=${{ env.WS_URL }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ github.run_number }}
          path: results/
          retention-days: 90

  stress-test:
    name: Stress Test (500 VUs, 10min)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.test_type == 'stress'

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run Stress Test
        run: |
          mkdir -p results
          k6 run infrastructure/load-tests/k6/stress.js \
            --env BASE_URL=${{ env.BASE_URL }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-results-${{ github.run_number }}
          path: results/
          retention-days: 90
