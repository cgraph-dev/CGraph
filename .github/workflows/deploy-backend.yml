name: Deploy Backend to Fly.io (Manual)

# IMPORTANT: Primary deployment is via deploy.yml (triggered by CI).
# This workflow is for manual/emergency deployments only.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend (Manual)
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Canary)
        working-directory: apps/backend
        run: |
          flyctl deploy --remote-only --strategy canary \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
