name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  PNPM_VERSION: '10'

jobs:
  # ============================================
  # Gate: Only deploy if CI passed
  # ============================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — deploying"

  # ============================================
  # Deploy Backend to Fly.io
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Canary)
        working-directory: apps/backend
        run: |
          # Deploy with canary strategy — Meta pattern:
          # Roll to 1 machine first, health-check, then promote to all
          flyctl deploy --remote-only --strategy canary \
            --wait-timeout 120

  # ============================================
  # Deploy Web to Cloudflare Pages
  # ============================================
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm run build --filter=@cgraph/web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cgraph-web
          directory: apps/web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # Build Mobile (EAS Build)
  # ============================================
  build-mobile:
    name: Build Mobile Apps
    runs-on: ubuntu-latest
    needs: [ci-gate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Setup Expo CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS and Android
        working-directory: apps/mobile
        run: eas build --platform all --non-interactive

  smoke-checks:
    name: Post-Deploy Smoke Checks
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-web]
    steps:
      - name: Backend health
        env:
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL }}
        run: |
          if [ -n "$BACKEND_HEALTH_URL" ]; then
            echo "Checking backend health at $BACKEND_HEALTH_URL"
            curl -f --max-time 10 "$BACKEND_HEALTH_URL"
          else
            echo "BACKEND_HEALTH_URL not set, skipping"
          fi

      - name: Web smoke
        env:
          WEB_SMOKE_URL: ${{ secrets.WEB_SMOKE_URL }}
        run: |
          if [ -n "$WEB_SMOKE_URL" ]; then
            echo "Checking web at $WEB_SMOKE_URL"
            curl -f --max-time 10 "$WEB_SMOKE_URL"
          else
            echo "WEB_SMOKE_URL not set, skipping"
          fi
