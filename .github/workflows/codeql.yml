name: CodeQL Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Sundays at 3 AM UTC (deeper analysis)
    - cron: '0 3 * * 0'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
        # Add more languages as needed:
        # - 'python' for Python code
        # - 'go' for Go code

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extended query suites for comprehensive analysis
          queries: +security-extended,security-and-quality
          # Configure paths to scan
          config: |
            paths:
              - apps/web/src
              - apps/mobile/src
              - packages
              - docs-website/src
            paths-ignore:
              - '**/node_modules/**'
              - '**/_build/**'
              - '**/deps/**'
              - '**/dist/**'
              - '**/build/**'
              - '**/*.min.js'
              - '**/pnpm-lock.yaml'
              - '**/__tests__/**'
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - '**/*.spec.ts'
              - '**/*.spec.tsx'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Autobuild attempts to build any compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          upload: true
          add-snippets: true

      - name: Upload CodeQL SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: ${{ github.workspace }}/../results/${{ matrix.language }}.sarif
          retention-days: 30
        if: always()
        continue-on-error: true

  # Summary job for branch protection rules
  codeql-complete:
    name: CodeQL Complete
    runs-on: ubuntu-latest
    needs: [analyze]
    if: always()
    steps:
      - name: Check CodeQL results
        run: |
          if [ "${{ needs.analyze.result }}" == "failure" ]; then
            echo "::error::CodeQL analysis failed"
            exit 1
          fi
          echo "CodeQL analysis completed successfully"
