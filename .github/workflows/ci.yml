name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELIXIR_VERSION: '1.17.3'
  OTP_VERSION: '26.2'
  NODE_VERSION: '22.x'
  PNPM_VERSION: '10'

permissions:
  contents: read
  pull-requests: write
  checks: write
  statuses: write

jobs:
  # ============================================
  # Lint & Format Check
  # ============================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

  # ============================================
  # TypeScript Type Checking
  # ============================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm run typecheck

  # ============================================
  # Backend Tests (Elixir/Phoenix)
  # ============================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cgraph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            apps/backend/deps
            apps/backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('apps/backend/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        working-directory: apps/backend
        run: mix deps.get

      - name: Check formatting
        working-directory: apps/backend
        run: mix format --check-formatted

      - name: Run Credo
        working-directory: apps/backend
        run: mix credo --strict

      - name: Compile (warnings as errors)
        working-directory: apps/backend
        run: mix compile --warnings-as-errors

      - name: Run tests
        working-directory: apps/backend
        env:
          MIX_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cgraph_test
          REDIS_URL: redis://localhost:6379
        run: mix test --cover --export-coverage default

      - name: Run Dialyzer
        working-directory: apps/backend
        run: mix dialyzer

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-cover
          path: apps/backend/cover
        if: always()

  # ============================================
  # Frontend Tests (React/TypeScript)
  # ============================================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test --filter=@cgraph/web -- --run --coverage

      - name: Build
        run: pnpm run build --filter=@cgraph/web

      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-cover
          path: apps/web/coverage
        if: always()

  # ============================================
  # Mobile Tests (React Native/Expo)
  # ============================================
  mobile-test:
    name: Mobile Lint / Typecheck / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (mobile)
        run: pnpm --filter @cgraph/mobile run lint

      - name: Typecheck (mobile)
        run: pnpm --filter @cgraph/mobile run typecheck

      - name: Tests (mobile)
        run: pnpm --filter @cgraph/mobile run test:ci

      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-cover
          path: apps/mobile/coverage
        if: always()

  # ============================================
  # Docker Image Builds (backend & web)
  # ============================================
  docker-build:
    name: Build Images (backend/web)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -f infrastructure/docker/Dockerfile.backend -t cgraph-backend:ci .

      - name: Build web image
        run: docker build -f infrastructure/docker/Dockerfile.web -t cgraph-web:ci .

  # ============================================
  # Coverage Summary (reports combined)
  # ============================================
  coverage-report:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, mobile-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-cover
          path: cover/backend

      - name: Download web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-cover
          path: cover/web

      - name: Download mobile coverage
        uses: actions/download-artifact@v4
        with:
          name: mobile-cover
          path: cover/mobile

      - name: Check coverage thresholds
        run: |
          echo "Coverage Report Summary"
          echo "======================"
          echo "Backend: cover/backend"
          echo "Web: cover/web"
          echo "Mobile: cover/mobile"
          # Enforce minimum 70% coverage (adjust as needed)
          if [ -f cover/web/coverage-summary.json ]; then
            WEB_PCT=$(cat cover/web/coverage-summary.json | jq -r '.total.lines.pct // 0')
            echo "Web coverage: ${WEB_PCT}%"
            if (( $(echo "$WEB_PCT < 70" | bc -l) )); then
              echo "::warning::Web coverage ${WEB_PCT}% is below 70% threshold"
            fi
          fi

      - name: Upload combined coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: combined-coverage
          path: cover
        if: always()

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --exit-code 1

      - name: Lint Dockerfile (backend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infrastructure/docker/Dockerfile.backend

      - name: Lint Dockerfile (web)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infrastructure/docker/Dockerfile.web

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install Elixir deps
        working-directory: apps/backend
        run: mix deps.get

      - name: Run Sobelow security scan
        working-directory: apps/backend
        run: mix sobelow --config

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        # Block deploys for high/critical vulnerabilities

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan dependencies (Grype)
        uses: anchore/scan-action@v4
        with:
          sbom: sbom.spdx.json
          fail-build: true
          severity-cutoff: critical
        # Block deploys for critical vulnerabilities

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            sbom.spdx.json
            results.sarif
          if-no-files-found: ignore
        if: always()
