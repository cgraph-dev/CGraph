<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Primary gradient - Purple to Indigo -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <!-- Secondary gradient - Emerald -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <!-- Metallic accent -->
    <linearGradient id="metallicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#94a3b8;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.5" />
    </linearGradient>
    <!-- Glow filter - Purple -->
    <filter id="glowPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feFlood flood-color="#a855f7" flood-opacity="0.4" result="glowColor" />
      <feComposite in="glowColor" in2="coloredBlur" operator="in" result="softGlow" />
      <feMerge>
        <feMergeNode in="softGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon border -->
  <polygon 
    points="50,3 93,25 93,75 50,97 7,75 7,25" 
    fill="none" 
    stroke="url(#primaryGrad)" 
    stroke-width="2" 
    stroke-linejoin="round"
    stroke-opacity="0.8"
  />

  <!-- Inner hexagon background -->
  <polygon points="50,8 88,28 88,72 50,92 12,72 12,28" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.1" stroke="#a855f7" stroke-width="0.3">
    <line x1="50" y1="8" x2="50" y2="92" />
    <line x1="12" y1="50" x2="88" y2="50" />
    <line x1="31" y1="18" x2="69" y2="82" />
    <line x1="69" y1="18" x2="31" y2="82" />
  </g>

  <!-- Decorative corner accents -->
  <g opacity="0.6">
    <circle cx="50" cy="8" r="2" fill="url(#secondaryGrad)" />
    <circle cx="88" cy="28" r="1.5" fill="url(#primaryGrad)" />
    <circle cx="88" cy="72" r="1.5" fill="url(#primaryGrad)" />
    <circle cx="50" cy="92" r="2" fill="url(#secondaryGrad)" />
    <circle cx="12" cy="72" r="1.5" fill="url(#primaryGrad)" />
    <circle cx="12" cy="28" r="1.5" fill="url(#primaryGrad)" />
  </g>

  <!-- CG Monogram -->
  <g filter="url(#glowPurple)">
    <!-- C letter -->
    <path d="M 28 35 C 28 28, 35 22, 45 22 L 45 22 C 42 22, 32 26, 32 35 L 32 65 C 32 74, 42 78, 45 78 L 45 78 C 35 78, 28 72, 28 65 Z" fill="url(#primaryGrad)" />
    <path d="M 45 22 L 55 22 L 55 28 L 45 28 C 38 28, 34 32, 34 35 L 34 36 L 28 36 L 28 35 C 28 28, 35 22, 45 22 Z" fill="url(#primaryGrad)" />
    <path d="M 45 78 L 55 78 L 55 72 L 45 72 C 38 72, 34 68, 34 65 L 34 64 L 28 64 L 28 65 C 28 72, 35 78, 45 78 Z" fill="url(#primaryGrad)" />
    
    <!-- G letter -->
    <path d="M 55 22 C 65 22, 72 28, 72 35 L 72 65 C 72 72, 65 78, 55 78 L 50 78 L 50 72 L 55 72 C 62 72, 66 68, 66 65 L 66 35 C 66 32, 62 28, 55 28 L 50 28 L 50 22 Z" fill="url(#secondaryGrad)" />
    <rect x="55" y="47" width="17" height="6" rx="1" fill="url(#secondaryGrad)" />
    <rect x="66" y="47" width="6" height="18" rx="1" fill="url(#secondaryGrad)" />
  </g>

  <!-- Central connecting node -->
  <g opacity="0.8">
    <circle cx="50" cy="50" r="4" fill="url(#metallicGrad)" />
    <circle cx="50" cy="50" r="2" fill="url(#primaryGrad)" />
    <line x1="50" y1="50" x2="35" y2="35" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.5" />
    <line x1="50" y1="50" x2="65" y2="35" stroke="url(#secondaryGrad)" stroke-width="1" opacity="0.5" />
    <line x1="50" y1="50" x2="35" y2="65" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.5" />
    <line x1="50" y1="50" x2="65" y2="65" stroke="url(#secondaryGrad)" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Orbital ring -->
  <ellipse cx="50" cy="50" rx="40" ry="12" fill="none" stroke="url(#primaryGrad)" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3" />
</svg>
