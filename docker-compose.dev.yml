# CGraph Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up
#
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 for caching/rate limiting
#   - meilisearch: MeiliSearch full-text search engine
#
# The backend (Elixir/Phoenix) runs natively via `mix phx.server`
# and connects to these services on localhost.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cgraph
      POSTGRES_PASSWORD: cgraph_dev_password
      POSTGRES_DB: cgraph_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cgraph']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: 'devMasterKey123'
      MEILI_ENV: 'development'
      MEILI_LOG_LEVEL: 'INFO'
      # Performance tuning
      MEILI_MAX_INDEXING_MEMORY: '1GiB'
      MEILI_MAX_INDEXING_THREADS: '2'
    ports:
      - '7700:7700'
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  meilidata:
