# Pre-commit configuration for CGraph
# Prevents secrets and sensitive data from being committed to the repository
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files
#
# @see https://pre-commit.com/
# @since v0.9.9

repos:
  # Gitleaks - Detect secrets in git repos
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets
        description: Scan for secrets like API keys, tokens, and passwords
        entry: gitleaks protect --staged --verbose
        language: golang
        pass_filenames: false

  # Detect-secrets - Yelp's secret detection tool
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets with Yelp
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            pnpm-lock.yaml|
            .*\.snap|
            .*\.md
          )$

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
        name: Check for large files
      - id: check-case-conflict
        name: Check for case conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-symlinks
        name: Check for broken symlinks
      - id: detect-private-key
        name: Detect private keys
      - id: end-of-file-fixer
        name: Fix end of file
        exclude: |
          (?x)^(
            .*\.snap|
            pnpm-lock.yaml
          )$
      - id: trailing-whitespace
        name: Fix trailing whitespace
        exclude: |
          (?x)^(
            .*\.snap|
            pnpm-lock.yaml
          )$
      - id: no-commit-to-branch
        name: Prevent commits to main/master
        args: ['--branch', 'main', '--branch', 'master']

  # TypeScript/JavaScript linting (runs ESLint)
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: pnpm lint
        language: system
        files: \.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: typecheck
        name: TypeScript Check
        entry: pnpm typecheck
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]

# CI configuration
ci:
  autofix_commit_msg: 'style: auto-fix from pre-commit hooks'
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  skip: [eslint, typecheck] # These run in CI pipeline instead
