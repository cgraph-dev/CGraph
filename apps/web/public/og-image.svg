<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Primary gradient - Purple to Indigo -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#6366f1" />
    </linearGradient>
    <!-- Secondary gradient - Emerald -->
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  
  <!-- Decorative hexagon pattern (faded) -->
  <g opacity="0.1">
    <polygon points="100,50 150,75 150,125 100,150 50,125 50,75" fill="none" stroke="url(#primaryGrad)" stroke-width="2"/>
    <polygon points="1100,480 1150,505 1150,555 1100,580 1050,555 1050,505" fill="none" stroke="url(#secondaryGrad)" stroke-width="2"/>
    <polygon points="200,500 250,525 250,575 200,600 150,575 150,525" fill="none" stroke="url(#primaryGrad)" stroke-width="2"/>
    <polygon points="1000,80 1050,105 1050,155 1000,180 950,155 950,105" fill="none" stroke="url(#secondaryGrad)" stroke-width="2"/>
  </g>

  <!-- Logo (scaled hexagon with CG) -->
  <g transform="translate(150, 165) scale(3)">
    <!-- Outer hexagon border -->
    <polygon points="50,3 93,25 93,75 50,97 7,75 7,25" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-linejoin="round" stroke-opacity="0.9" />
    <!-- Inner hexagon background -->
    <polygon points="50,8 88,28 88,72 50,92 12,72 12,28" fill="url(#bgGrad)" />
    <!-- C letter -->
    <path d="M 28 35 C 28 28, 35 22, 45 22 L 52 22 L 52 28 L 45 28 C 38 28, 34 32, 34 35 L 34 65 C 34 68, 38 72, 45 72 L 52 72 L 52 78 L 45 78 C 35 78, 28 72, 28 65 Z" fill="url(#primaryGrad)" />
    <!-- G letter -->
    <path d="M 55 22 C 65 22, 72 28, 72 35 L 72 65 C 72 72, 65 78, 55 78 L 50 78 L 50 72 L 55 72 C 62 72, 66 68, 66 65 L 66 53 L 58 53 L 58 47 L 72 47 L 72 35 C 72 32, 62 28, 55 28 L 50 28 L 50 22 Z" fill="url(#secondaryGrad)" />
    <!-- Corner accents -->
    <circle cx="50" cy="8" r="3" fill="url(#secondaryGrad)" />
    <circle cx="50" cy="92" r="3" fill="url(#secondaryGrad)" />
  </g>

  <!-- Main Title -->
  <text x="500" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white">CGraph</text>
  
  <!-- Tagline -->
  <text x="500" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#a5b4fc">The All-in-One Open-Source</text>
  <text x="500" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#a5b4fc">Communication Platform</text>

  <!-- Feature pills -->
  <g transform="translate(500, 450)">
    <!-- Messaging pill -->
    <rect x="0" y="0" width="180" height="45" rx="22" fill="rgba(168, 85, 247, 0.2)" stroke="#a855f7" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#c4b5fd">💬 Messaging</text>
    
    <!-- Forums pill -->
    <rect x="200" y="0" width="150" height="45" rx="22" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" stroke-width="1.5"/>
    <text x="275" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#6ee7b7">📰 Forums</text>
    
    <!-- Encrypted pill -->
    <rect x="370" y="0" width="170" height="45" rx="22" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1.5"/>
    <text x="455" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#a5b4fc">🔐 Encrypted</text>
  </g>

  <!-- Version badge -->
  <rect x="500" y="520" width="120" height="36" rx="18" fill="rgba(16, 185, 129, 0.3)" stroke="#10b981" stroke-width="1"/>
  <text x="560" y="545" text-anchor="middle" font-family="monospace" font-size="16" fill="#6ee7b7">v0.9.4</text>
  
  <!-- URL -->
  <text x="650" y="545" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">cgraph.org</text>
</svg>
