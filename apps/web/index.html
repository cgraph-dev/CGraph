<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CGraph - Secure messaging with E2E encryption, group channels, and community forums" />
    <meta name="theme-color" content="#00E5FF" />

    <!-- Open Graph -->
    <meta property="og:title" content="CGraph" />
    <meta property="og:description" content="Secure messaging with E2E encryption, group channels, and community forums" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cgraph.io" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CGraph" />
    <meta name="twitter:description" content="Secure messaging with E2E encryption" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>CGraph</title>

    <!-- Critical CSS - Inlined for faster LCP on landing page -->
    <style id="critical-css">
      /* Core variables for landing page - prevents FOUC */
      :root {
        --color-primary: #a78bfa;
        --color-primary-dark: #8b5cf6;
        --color-secondary: #10b981;
        --color-dark: #030712;
        --color-dark-alt: #0f0a1f;
        --gradient-primary: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        --gradient-hero: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #111827 100%);
        --glow-purple: 0 0 20px rgba(167, 139, 250, 0.5);
      }
      
      /* Critical layout - prevents layout shift */
      .demo-landing {
        background: var(--color-dark);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* Hero section critical styles */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      
      /* GPU acceleration hint for animated elements */
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
      }
      
      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Font display optimization */
      .font-display { font-family: 'Outfit', system-ui, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body class="bg-dark-900 text-white antialiased">
    <div id="root">
      <!-- Minimal purple loader - matches React LoadingSpinner, replaced on hydration -->
      <div id="initial-loader" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #030712 100%); gap: 24px;">
        <!-- Purple spinning ring -->
        <div style="width: 48px; height: 48px; border: 3px solid rgba(139, 92, 246, 0.2); border-top-color: #a78bfa; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <!-- CGraph text -->
        <span style="font-size: 1.25rem; font-weight: 600; color: #a78bfa; font-family: system-ui, sans-serif;">CGraph</span>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
