      rel="stylesheet"
    />

    <title>CGraph</title>

    <!-- Critical CSS - Inlined for faster LCP on landing page -->
    <style id="critical-css">
      /* Core variables for landing page - prevents FOUC */
      :root {
        --color-primary: #a78bfa;
        --color-primary-dark: #8b5cf6;
        --color-secondary: #10b981;
        --color-dark: #030712;
        --color-dark-alt: #0f0a1f;
        --gradient-primary: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        --gradient-hero: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #111827 100%);
        --glow-purple: 0 0 20px rgba(167, 139, 250, 0.5);
      }

      /* Critical layout - prevents layout shift */
      .demo-landing {
        background: var(--color-dark);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Hero section critical styles */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* GPU acceleration hint for animated elements */
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
      }

      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }

      /* Font display optimization */
      .font-display {
        font-family: 'Outfit', system-ui, sans-serif;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
    </style>
    <!-- Early error capture: catches module eval errors BEFORE React loads -->
    <script>
      window.__CGRAPH_ERRORS = [];
      window.onerror = function(msg, src, line, col, err) {
        var e = { msg: msg, src: src, line: line, col: col, stack: err && err.stack };
        window.__CGRAPH_ERRORS.push(e);
        console.error('[CGraph:early]', msg, src, line, col, err);
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.innerHTML =
            '<div style="text-align:center;max-width:600px;padding:20px">' +
            '<p style="color:#ef4444;font-size:1.1rem;font-weight:600;margin-bottom:12px">JavaScript Error</p>' +
            '<pre style="color:#fbbf24;font-size:11px;text-align:left;overflow:auto;max-height:300px;background:#1a1a2e;padding:12px;border-radius:8px;white-space:pre-wrap;word-break:break-all">' +
            (err ? (err.stack || err.message || String(err)) : msg) +
            '\n\nSource: ' + (src || 'unknown') + ':' + line + ':' + col +
            '</pre>' +
            '<button onclick="location.reload()" style="background:#7c3aed;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:0.875rem;margin-top:12px">Reload</button>' +
            '</div>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        window.__CGRAPH_ERRORS.push({ type: 'unhandledrejection', reason: String(reason), stack: reason && reason.stack });
        console.error('[CGraph:early] Unhandled rejection:', reason);
      });
    </script>
  </head>
  <body class="bg-dark-900 text-white antialiased">
    <div id="root">
      <!-- Plain dark background - no spinner, removed on hydration -->
      <div
        id="initial-loader"
        style="
          min-height: 100vh;
          background: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #030712 100%);
        "
      ></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Diagnostic: if React hasn't replaced the initial-loader within 15s, show an error
      setTimeout(function () {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          var errors = window.__CGRAPH_ERRORS || [];
          var errorDetail = '';
          if (errors.length > 0) {
            errorDetail = '<pre style="color:#fbbf24;font-size:11px;text-align:left;overflow:auto;max-height:200px;background:#1a1a2e;padding:12px;border-radius:8px;white-space:pre-wrap;word-break:break-all">';
            errors.forEach(function(e) {
              errorDetail += (e.stack || e.msg || e.reason || 'Unknown error') + '\n---\n';
            });
            errorDetail += '</pre>';
          }
          loader.innerHTML =
            '<div style="text-align:center;max-width:600px;padding:20px">' +
            '<p style="color:#ef4444;font-size:1.1rem;font-weight:600;margin-bottom:12px">Failed to load application</p>' +
            '<p style="color:#9ca3af;font-size:0.875rem;margin-bottom:16px">' +
            (errors.length > 0
              ? errors.length + ' JavaScript error(s) detected:'
              : 'The app took too long to start. This may be due to a network issue or a JavaScript error. Check Console (F12) for details.') +
            '</p>' +
            errorDetail +
            '<button onclick="location.reload()" style="background:#7c3aed;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:0.875rem;margin-top:12px">Reload Page</button>' +
            '</div>';
        }
      }, 15000);
    </script>
  </body>
</html>
