<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CGraph - Secure messaging with E2E encryption, group channels, and community forums" />
    <meta name="theme-color" content="#00E5FF" />

    <!-- Open Graph -->
    <meta property="og:title" content="CGraph" />
    <meta property="og:description" content="Secure messaging with E2E encryption, group channels, and community forums" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cgraph.io" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CGraph" />
    <meta name="twitter:description" content="Secure messaging with E2E encryption" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>CGraph</title>

    <!-- Critical CSS - Inlined for faster LCP on landing page -->
    <style id="critical-css">
      /* Core variables for landing page - prevents FOUC */
      :root {
        --color-primary: #10b981;
        --color-primary-dark: #059669;
        --color-secondary: #8b5cf6;
        --color-dark: #030712;
        --color-dark-alt: #0a0f1a;
        --gradient-primary: linear-gradient(135deg, #10b981 0%, #8b5cf6 100%);
        --gradient-hero: linear-gradient(135deg, #030712 0%, #0a0f1a 50%, #111827 100%);
        --glow-emerald: 0 0 20px rgba(16, 185, 129, 0.5);
      }
      
      /* Critical layout - prevents layout shift */
      .demo-landing {
        background: var(--color-dark);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* Hero section critical styles */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      
      /* GPU acceleration hint for animated elements */
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
      }
      
      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Font display optimization */
      .font-display { font-family: 'Outfit', system-ui, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body class="bg-dark-900 text-white antialiased">
    <div id="root">
      <!-- Initial loading state - replaced by React -->
      <div id="initial-loader" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #030712, #111827, #030712); position: relative; overflow: hidden;">
        <!-- Animated particles -->
        <svg style="position: absolute; width: 100%; height: 100%; opacity: 0.3;" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20%" cy="30%" r="2" fill="#10b981">
            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="80%" cy="20%" r="1.5" fill="#10b981">
            <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="60%" cy="70%" r="2" fill="#8b5cf6">
            <animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="30%" cy="80%" r="1" fill="#06b6d4">
            <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
          </circle>
        </svg>

        <!-- Animated logo container -->
        <div style="position: relative; width: 80px; height: 80px;">
          <!-- Outer glow ring -->
          <div style="position: absolute; inset: 0; border-radius: 16px; background: radial-gradient(circle, rgba(16, 185, 129, 0.4), transparent 70%); filter: blur(20px); animation: pulse 2s ease-in-out infinite;"></div>

          <!-- Rotating border -->
          <div style="position: absolute; inset: 0; width: 80px; height: 80px; border: 2px solid rgba(16, 185, 129, 0.2); border-radius: 16px; animation: rotate 20s linear infinite;"></div>

          <!-- Main logo -->
          <div style="position: relative; width: 80px; height: 80px; border-radius: 16px; background: linear-gradient(135deg, #10b981, #059669, #8b5cf6); display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 60px rgba(16, 185, 129, 0.5);">
            <div style="position: absolute; inset: 0; background: linear-gradient(45deg, rgba(6, 182, 212, 0.3), transparent, rgba(139, 92, 246, 0.3)); border-radius: 16px; animation: rotateGradient 10s linear infinite;"></div>
            <span style="font-size: 2.5rem; font-weight: bold; color: white; position: relative; z-index: 10; text-shadow: 0 4px 8px rgba(0,0,0,0.3);">C</span>
          </div>
        </div>

        <!-- Text -->
        <div style="margin-top: 32px; text-align: center;">
          <h1 style="font-size: 1.875rem; font-weight: bold; background: linear-gradient(90deg, #10b981, #06b6d4, #8b5cf6, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 200% auto; animation: shimmer 3s linear infinite;">
            CGraph
          </h1>
          <p style="margin-top: 12px; color: #9ca3af; font-family: system-ui, sans-serif; animation: fadeInOut 1.5s ease-in-out infinite;">
            Loading...
          </p>
        </div>

        <style>
          @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
          }
          @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
          }
          @keyframes rotateGradient {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
          }
          @keyframes shimmer {
            from { background-position: 0% center; }
            to { background-position: 200% center; }
          }
          @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
