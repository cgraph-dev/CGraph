<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO Meta Tags -->
    <title>CGraph - Beyond Messaging | Secure Communication Platform</title>
    <meta name="title" content="CGraph - Beyond Messaging | Secure Communication Platform" />
    <meta name="description" content="Real-time messaging meets community forums — with bank-grade E2E encryption, Web3 authentication, group channels, and rewards that make every interaction count." />
    <meta name="keywords" content="secure messaging, encrypted chat, end-to-end encryption, community forums, voice calls, video calls, Web3, blockchain, real-time communication, privacy" />
    <meta name="author" content="CGraph" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cgraph.org/" />
    <meta property="og:title" content="CGraph - Beyond Messaging" />
    <meta property="og:description" content="Real-time messaging meets community forums — with bank-grade encryption, Web3 authentication, and rewards that make every interaction count." />
    <meta property="og:image" content="https://cgraph.org/og-image.png" />
    <meta property="og:image:width" content="1200" />

    <meta property="og:image:alt" content="CGraph - The All-in-One Secure Communication Platform" />

    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cgraph.org/" />
    <meta name="twitter:title" content="CGraph - Beyond Messaging" />
    <meta name="twitter:description" content="Real-time messaging meets community forums — with bank-grade encryption, Web3 authentication, and rewards." />
    <meta name="twitter:image" content="https://cgraph.org/og-image.png" />
    <meta name="twitter:image:alt" content="CGraph - The All-in-One Secure Communication Platform" />
    
    <!-- Additional SEO -->
    <link rel="canonical" href="https://cgraph.org/" />
    <meta name="application-name" content="CGraph" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>CGraph</title>

    <!-- Critical CSS - Inlined for faster LCP on landing page -->
    <style id="critical-css">
      /* Core variables for landing page - prevents FOUC */
      :root {
        --color-primary: #a78bfa;
        --color-primary-dark: #8b5cf6;
        --color-secondary: #10b981;
        --color-dark: #030712;
        --color-dark-alt: #0f0a1f;
        --gradient-primary: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        --gradient-hero: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #111827 100%);
        --glow-purple: 0 0 20px rgba(167, 139, 250, 0.5);
      }
      
      /* Critical layout - prevents layout shift */
      .demo-landing {
        background: var(--color-dark);
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
      }
      
      /* Hero section critical styles */
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      
      /* GPU acceleration hint for animated elements */
      .gpu-accelerated {
        transform: translateZ(0);
        backface-visibility: hidden;
      }
      
      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
      
      /* Font display optimization */
      .font-display { font-family: 'Outfit', system-ui, sans-serif; }
      .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body class="bg-dark-900 text-white antialiased">
    <div id="root">
      <!-- Gradient spinner - matches React LoadingSpinner, replaced on hydration -->
      <div id="initial-loader" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #030712 0%, #0f0a1f 50%, #030712 100%); gap: 24px;">
        <!-- Gradient spinning ring -->
        <svg width="48" height="48" viewBox="0 0 50 50" style="animation: spin 1s linear infinite;">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a78bfa"/>
              <stop offset="50%" stop-color="#8b5cf6"/>
              <stop offset="100%" stop-color="#10b981"/>
            </linearGradient>
          </defs>
          <circle cx="25" cy="25" r="20" fill="none" stroke="url(#grad)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 45"/>
        </svg>
        <!-- CGraph text with gradient -->
        <span style="font-size: 1.25rem; font-weight: 600; font-family: system-ui, sans-serif; background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 50%, #10b981 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">CGraph</span>
        <style>
          @keyframes spin { to { transform: rotate(360deg); } }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
