<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>CGraph - Beyond Messaging | Secure Real-Time Communication Platform</title>
    <meta
      name="title"
      content="CGraph - Beyond Messaging | Secure Real-Time Communication Platform"
    />
    <meta
      name="description"
      content="Real-time messaging meets community forums — with end-to-end encryption, Web3 authentication, and rewards that make every interaction count. Start free today."
    />
    <meta
      name="keywords"
      content="secure messaging, encrypted chat, end-to-end encryption, community forums, voice calls, video calls, Web3, blockchain, real-time communication, privacy"
    />
    <meta name="author" content="CGraph" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cgraph.org/" />
    <meta
      property="og:title"
      content="CGraph - Beyond Messaging | Secure Encrypted Communication"
    />
    <meta
      property="og:description"
      content="Real-time messaging meets community forums — with end-to-end encryption, Web3 authentication, and rewards that make every interaction count."
    />
    <meta property="og:image" content="https://cgraph.org/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CGraph - The All-in-One Secure Communication Platform" />
    <meta property="og:site_name" content="CGraph" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://cgraph.org/" />
    <meta
      name="twitter:title"
      content="CGraph - Beyond Messaging | Secure Encrypted Communication"
    />
    <meta
      name="twitter:description"
      content="Real-time messaging meets community forums — with end-to-end encryption, Web3 authentication, and rewards that make every interaction count."
    />
    <meta name="twitter:image" content="https://cgraph.org/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="CGraph - The All-in-One Secure Communication Platform"
    />

    <!-- Additional SEO -->
    <link rel="canonical" href="https://cgraph.org/" />
    <meta name="application-name" content="CGraph" />

    <!-- Preload critical fonts -->
    <link
      rel="preload"
      href="/fonts/zentry-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/general.woff2" as="font" type="font/woff2" crossorigin />
    <link
      rel="preload"
      href="/fonts/robert-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/robert-medium.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Google Fonts (non-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Orbitron:wght@400;600;700;900&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Orbitron:wght@400;600;700;900&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap"
    /></noscript>
  </head>

    <div id="root"></div>
