      http-equiv="Content-Security-Policy"

    <!-- Primary SEO Meta Tags -->
    <title>CGraph v1.0 — Secure Community Platform | E2EE Messaging, Forums, Voice & Video</title>

      name="title"
      content="CGraph v1.0 — Secure Community Platform | E2EE Messaging, Forums, Voice & Video"

    <!-- Open Graph / Facebook -->

    <meta property="og:url" content="https://cgraph.org/" />

      property="og:title"

    <meta name="application-name" content="CGraph" />
