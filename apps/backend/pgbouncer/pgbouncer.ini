; CGraph PgBouncer Configuration
; Deployed as a sidecar process on Fly.io alongside the Phoenix app
; The app connects to PgBouncer on localhost:6432, which proxies to PostgreSQL

[databases]
; The actual DATABASE_URL is injected at runtime via environment variable
; PgBouncer resolves this from the auth_file or environment
* = host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER} password=${DB_PASSWORD}

[pgbouncer]
; ── Listen Settings ──
listen_addr = 127.0.0.1
listen_port = 6432

; ── Authentication ──
auth_type = trust
; Trust local connections since PgBouncer runs as a sidecar on the same machine

; ── Pool Mode ──
; transaction: Each transaction gets its own server connection
; This is the recommended mode for Phoenix/Ecto (supports prepared: :unnamed)
pool_mode = transaction

; ── Connection Limits ──
; max_client_conn: Maximum number of client connections PgBouncer accepts
; With 2 Fly machines × pool_size 20 = 40 app connections max per machine
max_client_conn = 200

; default_pool_size: How many server connections to maintain per database
; This is the actual number of connections to PostgreSQL
default_pool_size = 25

; min_pool_size: Minimum server connections to keep open
min_pool_size = 5

; reserve_pool_size: Extra connections for burst traffic
reserve_pool_size = 5

; reserve_pool_timeout: Seconds before a reserve connection is released
reserve_pool_timeout = 3

; ── Timeouts ──
; server_connect_timeout: Timeout for connecting to PostgreSQL
server_connect_timeout = 5

; server_login_retry: Seconds to wait before retrying a failed server connection
server_login_retry = 3

; server_lifetime: Close server connections older than this (seconds)
; Helps prevent stale connections; 3600 = 1 hour
server_lifetime = 3600

; server_idle_timeout: Close idle server connections after this many seconds
server_idle_timeout = 600

; client_idle_timeout: Close idle client connections after this many seconds
; 0 = disabled (Phoenix manages its own pool timeouts)
client_idle_timeout = 0

; client_login_timeout: Timeout for client authentication
client_login_timeout = 60

; query_timeout: Maximum time a query can run (0 = disabled, let app handle)
query_timeout = 0

; query_wait_timeout: Maximum time a client waits for a server connection
query_wait_timeout = 120

; ── Logging ──
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; ── Security ──
; Disable admin/stats access from network (only local monitoring)
admin_users = pgbouncer
stats_users = pgbouncer

; ── TCP Settings ──
tcp_keepalive = 1
tcp_keepidle = 30
tcp_keepintvl = 10
tcp_keepcnt = 3

; ── DNS ──
; Fly.io uses internal DNS for database resolution
dns_max_ttl = 15
