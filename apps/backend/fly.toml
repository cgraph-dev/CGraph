# CGraph Backend Fly.io Configuration
# Scale-ready for 10K users
app = "cgraph-backend"
primary_region = "fra"  # Frankfurt - close to Supabase Europe region
kill_signal = "SIGTERM"
kill_timeout = "30s"

[experimental]
  auto_rollback = true

[build]
  dockerfile = "Dockerfile"

[env]
  MIX_ENV = "prod"
  PHX_SERVER = "true"
  PORT = "4000"
  ECTO_IPV6 = "true"
  ERL_AFLAGS = "-proto_dist inet6_tcp"
  # Optimized BEAM settings for production load
  # +S 2:2 - Use 2 schedulers (matches 2 CPU cores)
  # +SDcpu 2:2 - Match scheduler count to CPUs
  # +sbwt short - Short busy wait threshold for better latency
  # +swt low - Low scheduler wakeup threshold
  # +stbt ts - Use time-stealing for load balancing
  ELIXIR_ERL_OPTIONS = "+S 2:2 +SDcpu 2:2 +sbwt short +swt low +stbt ts"
  ERL_CRASH_DUMP_SECONDS = "10"

  # Meilisearch: Set these secrets via `fly secrets set`:
  #   fly secrets set MEILISEARCH_URL=https://your-meilisearch.example.com
  #   fly secrets set MEILISEARCH_API_KEY=your_production_master_key
  # If not set, search gracefully falls back to PostgreSQL ILIKE queries.

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false  # Keep machines running for WebSocket connections
  auto_start_machines = true
  min_machines_running = 2    # Minimum 2 for redundancy, scale to 3+ for 10K
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2000         # Increased for WebSocket scaling
    soft_limit = 1800

  [[http_service.checks]]
    interval = "15s"          # More frequent health checks
    timeout = "3s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

  # Readiness check — returns 503 during graceful shutdown drain
  [[http_service.checks]]
    interval = "5s"
    timeout = "2s"
    grace_period = "15s"
    method = "GET"
    path = "/ready"

[[vm]]
  cpu_kind = "performance"    # Performance CPUs for 10K users
  cpus = 2                    # 2 CPUs for better WebSocket handling
  memory = "4gb"              # 4GB RAM required for performance CPUs

# PgBouncer sidecar for connection pooling/multiplexing
# Multiplexes app connections to PostgreSQL, allowing 5-10x more effective connections
# Deploy: fly deploy --strategy rolling
# The app connects to PgBouncer on localhost:6432, which proxies to the real DB
# Set PGBOUNCER_DATABASE_URL=postgresql://user:pass@127.0.0.1:6432/dbname
# Prometheus metrics endpoint for Fly.io built-in scraping
# Exposed at /metrics via MetricsController (api_relaxed pipeline)
[metrics]
  port = 4000
  path = "/metrics"

[processes]
  app = "/usr/local/bin/start-with-app.sh"
  pgbouncer = "/usr/local/bin/start-pgbouncer.sh"
