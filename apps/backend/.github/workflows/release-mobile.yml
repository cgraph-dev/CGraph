name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - all
          - ios
          - android

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10'

jobs:
  build-and-submit:
    name: Build & Submit (${{ inputs.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify EAS project
        working-directory: apps/mobile
        run: eas whoami

      - name: Build iOS
        if: inputs.platform == 'all' || inputs.platform == 'ios'
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --non-interactive

      - name: Build Android
        if: inputs.platform == 'all' || inputs.platform == 'android'
        working-directory: apps/mobile
        run: eas build --platform android --profile production --non-interactive

      - name: Submit iOS to App Store
        if: inputs.platform == 'all' || inputs.platform == 'ios'
        working-directory: apps/mobile
        run: eas submit --platform ios --profile production --non-interactive
        continue-on-error: true

      - name: Submit Android to Google Play
        if: inputs.platform == 'all' || inputs.platform == 'android'
        working-directory: apps/mobile
        run: eas submit --platform android --profile production --non-interactive
        continue-on-error: true

      - name: Summary
        run: |
          echo "## Mobile Release v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: ${{ inputs.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check [EAS Dashboard](https://expo.dev) for build status and submission results." >> $GITHUB_STEP_SUMMARY
