# CGraph Prometheus Configuration
# Scrapes metrics from the Phoenix backend

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cgraph-dev'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# SLO recording rules and alert definitions
rule_files:
  - 'rules/cgraph-slo-rules.yml'
  - 'rules/cgraph-alerting-rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  # CGraph Backend (Phoenix)
  - job_name: 'cgraph-backend'
    static_configs:
      - targets: ['backend-dev:4000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    # Add labels for identification
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cgraph-backend'

  # Redis metrics via redis_exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cgraph-redis'

  # PostgreSQL metrics via postgres_exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'cgraph-postgres'

  # Node exporter for system metrics (optional)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
