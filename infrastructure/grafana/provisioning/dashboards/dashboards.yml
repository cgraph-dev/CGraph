# Grafana Dashboard Provisioning
# Automatically loads dashboards from JSON files

apiVersion: 1

providers:
  - name: 'CGraph Dashboards'
    orgId: 1
    folder: 'CGraph'
    folderUid: 'cgraph'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
