# CGraph Fly.io Configuration
# Backend application deployment
#
# Optimized for Elixir/Phoenix BEAM VM workloads
# Memory sized for efficient garbage collection and scheduler performance

app = "cgraph"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"  # Allow graceful shutdown of active connections

[experimental]
  auto_rollback = true

[build]
  dockerfile = "../docker/Dockerfile.backend"

[env]
  MIX_ENV = "prod"
  PHX_SERVER = "true"
  PORT = "4000"
  ECTO_IPV6 = "true"
  # BEAM VM tuning for production
  ERL_AFLAGS = "-proto_dist inet6_tcp"
  # Scheduler tuning: +S matches CPU count, +SDcpu enables dirty CPU schedulers
  ELIXIR_ERL_OPTIONS = "+S 2:2 +SDcpu 2:2 +sbwt very_short +swt very_low"
  # Memory allocator settings for better performance
  ERL_CRASH_DUMP_SECONDS = "10"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2  # Scaled for HA with 10K+ concurrent users
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 2000
    soft_limit = 1500

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"  # Extended for BEAM startup
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "dedicated"  # Dedicated CPUs for consistent performance at scale
  cpus = 2
  memory = "2048mb"  # 2GB for BEAM VM with 10K+ WebSocket connections

[metrics]
  port = 9091
  path = "/metrics"

[[statics]]
  guest_path = "/app/priv/static"
  url_prefix = "/static"
