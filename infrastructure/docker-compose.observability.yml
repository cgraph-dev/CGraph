# CGraph Observability Stack
# Usage: docker compose -f infrastructure/docker-compose.observability.yml up -d
#
# Provides:
#   - Prometheus    (metrics collection + SLO rules)     → http://localhost:9090
#   - Grafana       (dashboards + alerting)              → http://localhost:3001
#   - Alertmanager  (alert routing: Slack + PagerDuty)   → http://localhost:9093
#   - Tempo         (distributed tracing backend)        → :4317 (gRPC), :4318 (HTTP)
#   - Loki          (log aggregation)                    → http://localhost:3100
#   - Promtail      (log shipper → Loki)
#   - Redis Exporter  (Redis metrics)                    → :9121
#   - Postgres Exporter (PostgreSQL metrics)             → :9187
#
# Prerequisites:
#   - Backend running on host port 4000 (or update BACKEND_HOST)
#   - Redis accessible (or update REDIS_ADDR)
#   - PostgreSQL accessible (or update DATA_SOURCE_NAME)

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: '10m'
      max-file: '3'

services:
  # ─── Prometheus ───────────────────────────────────────────────
  prometheus:
    <<: *common
    image: prom/prometheus:v2.53.0
    container_name: cgraph-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    extra_hosts:
      - 'backend-dev:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9090/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Alertmanager ─────────────────────────────────────────────
  alertmanager:
    <<: *common
    image: prom/alertmanager:v0.27.0
    container_name: cgraph-alertmanager
    ports:
      - '9093:9093'
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/PLACEHOLDER}
      - PAGERDUTY_SERVICE_KEY=${PAGERDUTY_SERVICE_KEY:-placeholder-key}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat /etc/alertmanager/alertmanager.yml.tmpl | \
          sed "s|\$${SLACK_WEBHOOK_URL}|$$SLACK_WEBHOOK_URL|g" | \
          sed "s|\$${PAGERDUTY_SERVICE_KEY}|$$PAGERDUTY_SERVICE_KEY|g" \
          > /tmp/alertmanager.yml && \
        /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.external-url=http://localhost:9093
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9093/-/healthy']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Grafana ──────────────────────────────────────────────────
  grafana:
    <<: *common
    image: grafana/grafana:11.1.0
    container_name: cgraph-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=cgraph-dev
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/json/cgraph-cloud-overview.json
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Tempo (Distributed Tracing) ─────────────────────────────
  tempo:
    <<: *common
    image: grafana/tempo:2.5.0
    container_name: cgraph-tempo
    ports:
      - '3200:3200' # Tempo query frontend
      - '4317:4317' # OTLP gRPC receiver
      - '4318:4318' # OTLP HTTP receiver
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command:
      - '-config.file=/etc/tempo/tempo.yml'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3200/ready']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Loki (Log Aggregation) ──────────────────────────────────
  loki:
    <<: *common
    image: grafana/loki:3.1.0
    container_name: cgraph-loki
    ports:
      - '3100:3100'
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command:
      - '-config.file=/etc/loki/loki.yml'
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3100/ready']
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── Promtail (Log Shipper → Loki) ──────────────────────────
  promtail:
    <<: *common
    image: grafana/promtail:3.1.0
    container_name: cgraph-promtail
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command:
      - '-config.file=/etc/promtail/promtail.yml'
    depends_on:
      loki:
        condition: service_healthy

  # ─── Redis Exporter ───────────────────────────────────────────
  redis-exporter:
    <<: *common
    image: oliver006/redis_exporter:v1.62.0
    container_name: cgraph-redis-exporter
    ports:
      - '9121:9121'
    environment:
      - REDIS_ADDR=${REDIS_ADDR:-redis://host.docker.internal:6379}
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  # ─── Postgres Exporter ────────────────────────────────────────
  postgres-exporter:
    <<: *common
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: cgraph-postgres-exporter
    ports:
      - '9187:9187'
    environment:
      - DATA_SOURCE_NAME=${PG_DSN:-postgresql://postgres:postgres@host.docker.internal:5432/cgraph_dev?sslmode=disable}
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  tempo_data:
    driver: local
  loki_data:
    driver: local
