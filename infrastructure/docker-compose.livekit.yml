# LiveKit SFU Local Development Server
#
# Usage:
#   docker compose -f infrastructure/docker-compose.livekit.yml up -d
#
# This starts a local LiveKit SFU server for development.
# Default credentials: api_key=devkey, api_secret=secret
#
# Ports:
#   7880 - HTTP/WS (client API + WebSocket signaling)
#   7881 - TCP (TURN/TLS)
#   50000-50100/udp - WebRTC media (UDP)
#
# Configuration:
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=secret
#   LIVEKIT_URL=ws://localhost:7880

services:
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret"
    command: --dev --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
