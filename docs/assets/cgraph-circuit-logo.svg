<?xml version="1.0" encoding="UTF-8"?>
<!--
  CGraph Circuit Board Logo
  
  A futuristic circuit-board styled "CG" monogram representing:
  - Graph connections (circuit traces)
  - Network nodes (connection points)
  - Technology-forward identity
  - Real-time data flow
  
  Color variants:
  - default: Cyan glow (#00d4ff) with purple accents
  - emerald: Emerald glow (#10b981) with cyan accents  
  - purple: Purple glow (#8b5cf6) with emerald accents
  - white: Monochrome white for dark backgrounds
  - dark: Monochrome dark for light backgrounds
-->
<svg viewBox="0 0 120 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main cyan glow gradient -->
    <linearGradient id="circuit-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    
    <!-- Secondary purple accent gradient -->
    <linearGradient id="circuit-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <!-- Emerald accent gradient -->
    <linearGradient id="circuit-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Outer glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Intense glow for nodes -->
    <filter id="node-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Hexagon clip path for optional framing -->
    <clipPath id="hex-frame">
      <path d="M60 4L110 28V68L60 92L10 68V28L60 4Z"/>
    </clipPath>
  </defs>
  
  <!-- Optional hexagon frame (comment out for frameless) -->
  <path 
    d="M60 4L110 28V68L60 92L10 68V28L60 4Z" 
    fill="none" 
    stroke="url(#circuit-glow)" 
    stroke-width="1.5" 
    stroke-opacity="0.3"
    filter="url(#glow)"
  />
  
  <!-- ========================================= -->
  <!-- "C" LETTER - Left Side Circuit Traces    -->
  <!-- ========================================= -->
  <g filter="url(#glow)">
    <!-- C - Top horizontal trace -->
    <path d="M18 20H42" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- C - Top right angle down -->
    <path d="M42 20V26L48 32" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- C - Left vertical main stroke -->
    <path d="M18 20V48V76" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- C - Bottom horizontal trace -->
    <path d="M18 76H42" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- C - Bottom right angle up -->
    <path d="M42 76V70L48 64" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- C - Middle branch traces -->
    <path d="M18 48H30L36 42" stroke="url(#circuit-glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 48L36 54" stroke="url(#circuit-glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- C - Additional detail traces -->
    <path d="M24 28H32L38 34" stroke="url(#circuit-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
    <path d="M24 68H32L38 62" stroke="url(#circuit-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
  </g>
  
  <!-- C - Circuit Nodes -->
  <g filter="url(#node-glow)">
    <!-- Main nodes -->
    <circle cx="18" cy="20" r="3" fill="url(#circuit-glow)"/>
    <circle cx="42" cy="20" r="2.5" fill="url(#circuit-glow)"/>
    <circle cx="48" cy="32" r="2" fill="url(#circuit-glow)"/>
    <circle cx="18" cy="48" r="3" fill="url(#circuit-glow)"/>
    <circle cx="18" cy="76" r="3" fill="url(#circuit-glow)"/>
    <circle cx="42" cy="76" r="2.5" fill="url(#circuit-glow)"/>
    <circle cx="48" cy="64" r="2" fill="url(#circuit-glow)"/>
    
    <!-- Secondary nodes -->
    <circle cx="36" cy="42" r="2" fill="url(#circuit-accent)"/>
    <circle cx="36" cy="54" r="2" fill="url(#circuit-accent)"/>
    <circle cx="30" cy="48" r="1.5" fill="url(#circuit-glow)"/>
    
    <!-- Detail nodes -->
    <circle cx="38" cy="34" r="1.5" fill="url(#circuit-accent)" fill-opacity="0.7"/>
    <circle cx="38" cy="62" r="1.5" fill="url(#circuit-accent)" fill-opacity="0.7"/>
  </g>
  
  <!-- ========================================= -->
  <!-- "G" LETTER - Right Side Circuit Traces   -->
  <!-- ========================================= -->
  <g filter="url(#glow)">
    <!-- G - Top horizontal trace -->
    <path d="M72 20H102" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- G - Top left angle down -->
    <path d="M72 20V26L66 32" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- G - Right vertical stroke (partial) -->
    <path d="M102 20V44" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- G - Bottom horizontal trace -->
    <path d="M72 76H102" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- G - Bottom left angle up -->
    <path d="M72 76V70L66 64" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- G - Right vertical bottom -->
    <path d="M102 76V52" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- G - Middle crossbar (the distinctive G element) -->
    <path d="M102 48H84L78 42" stroke="url(#circuit-glow)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M84 48L78 54" stroke="url(#circuit-glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- G - Connection traces between C and G -->
    <path d="M54 38H60L66 32" stroke="url(#circuit-emerald)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.6"/>
    <path d="M54 58H60L66 64" stroke="url(#circuit-emerald)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.6"/>
    
    <!-- G - Additional detail traces -->
    <path d="M96 28H88L82 34" stroke="url(#circuit-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
    <path d="M96 68H88L82 62" stroke="url(#circuit-accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.7"/>
  </g>
  
  <!-- G - Circuit Nodes -->
  <g filter="url(#node-glow)">
    <!-- Main nodes -->
    <circle cx="72" cy="20" r="2.5" fill="url(#circuit-glow)"/>
    <circle cx="102" cy="20" r="3" fill="url(#circuit-glow)"/>
    <circle cx="66" cy="32" r="2" fill="url(#circuit-glow)"/>
    <circle cx="102" cy="48" r="3" fill="url(#circuit-glow)"/>
    <circle cx="72" cy="76" r="2.5" fill="url(#circuit-glow)"/>
    <circle cx="102" cy="76" r="3" fill="url(#circuit-glow)"/>
    <circle cx="66" cy="64" r="2" fill="url(#circuit-glow)"/>
    
    <!-- Secondary nodes -->
    <circle cx="78" cy="42" r="2" fill="url(#circuit-accent)"/>
    <circle cx="78" cy="54" r="2" fill="url(#circuit-accent)"/>
    <circle cx="84" cy="48" r="1.5" fill="url(#circuit-glow)"/>
    
    <!-- Connection nodes (between C and G) -->
    <circle cx="54" cy="38" r="1.5" fill="url(#circuit-emerald)" fill-opacity="0.6"/>
    <circle cx="54" cy="58" r="1.5" fill="url(#circuit-emerald)" fill-opacity="0.6"/>
    <circle cx="60" cy="48" r="2" fill="url(#circuit-emerald)" fill-opacity="0.8"/>
    
    <!-- Detail nodes -->
    <circle cx="82" cy="34" r="1.5" fill="url(#circuit-accent)" fill-opacity="0.7"/>
    <circle cx="82" cy="62" r="1.5" fill="url(#circuit-accent)" fill-opacity="0.7"/>
  </g>
  
  <!-- Central connection hub (the "Graph" element linking C and G) -->
  <g filter="url(#node-glow)">
    <circle cx="60" cy="48" r="4" fill="url(#circuit-emerald)"/>
    <circle cx="60" cy="48" r="2" fill="#fff" fill-opacity="0.5"/>
  </g>
</svg>
