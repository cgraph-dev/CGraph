<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="140" height="140">
  <defs>
    <!-- Cyan gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
    <!-- Magenta gradient -->
    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF00FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D500F9;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background dark circle -->
  <circle cx="50" cy="50" r="45" fill="#0A1628" />

  <!-- Outer geometric ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#cyanGrad)" stroke-width="1" stroke-opacity="0.3" />

  <!-- Inner diamond/geometric shape - main logo -->
  <g filter="url(#glow)">
    <!-- Top diamond - cyan -->
    <polygon points="50,15 70,35 50,55 30,35" fill="url(#cyanGrad)" fill-opacity="0.9" />
    <!-- Bottom diamond - magenta -->
    <polygon points="50,45 70,65 50,85 30,65" fill="url(#magentaGrad)" fill-opacity="0.9" />
    <!-- Left accent triangle -->
    <polygon points="25,50 35,40 35,60" fill="#00E5FF" fill-opacity="0.6" />
    <!-- Right accent triangle -->
    <polygon points="75,50 65,40 65,60" fill="#FF00FF" fill-opacity="0.6" />
  </g>

  <!-- Connecting lines for graph effect -->
  <g stroke="white" stroke-width="0.5" stroke-opacity="0.4">
    <line x1="50" y1="15" x2="70" y2="35" />
    <line x1="50" y1="15" x2="30" y2="35" />
    <line x1="50" y1="55" x2="50" y2="45" />
    <line x1="70" y1="65" x2="75" y2="50" />
    <line x1="30" y1="65" x2="25" y2="50" />
  </g>

  <!-- Node points for graph visualization -->
  <g>
    <circle cx="50" cy="15" r="3" fill="#00E5FF" />
    <circle cx="70" cy="35" r="2" fill="#00E5FF" />
    <circle cx="30" cy="35" r="2" fill="#00E5FF" />
    <circle cx="50" cy="85" r="3" fill="#FF00FF" />
    <circle cx="70" cy="65" r="2" fill="#FF00FF" />
    <circle cx="30" cy="65" r="2" fill="#FF00FF" />
  </g>
</svg>
