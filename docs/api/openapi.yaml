        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [text, voice, announcement]
                category_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'

  /forums:
    get:
      tags: [Forums]
      summary: List forums
      operationId: listForums
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of forums
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Forum'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Forums]
      summary: Create a forum
      operationId: createForum
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                slug:
                  type: string
                  pattern: '^[a-z0-9-]+$'
                description:
                  type: string
                category_id:
                  type: string
                  format: uuid
                is_public:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Forum created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Forum'

  /forums/{forum_id}/threads:
    get:
      tags: [Threads]
      summary: List threads in forum
      operationId: listForumThreads
      parameters:
        - name: forum_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: sort
          in: query
          schema:
            type: string
            enum: [hot, new, top, controversial]
            default: hot
      responses:
        '200':
          description: List of threads
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thread'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Threads]
      summary: Create thread in forum
      operationId: createThread
      security:
        - BearerAuth: []
      parameters:
        - name: forum_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 300
                content:
                  type: string
                  minLength: 10
                flair:
                  type: string
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thread'

  /upload:
    post:
      tags: [Uploads]
      summary: Upload a file
      operationId: uploadFile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [avatar, attachment, voice]
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri
                  filename:
                    type: string
                  size:
                    type: integer
                  content_type:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: HTTP-only cookie containing JWT access token (v0.9.0+)

  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    AuthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT access token
            refresh_token:
              type: string
              description: Refresh token for obtaining new access tokens
            expires_at:
              type: string
              format: date-time
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type: string
          format: uri
        bio:
          type: string
        status:
          type: string
          enum: [online, away, busy, offline]
        last_seen_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        has_2fa_enabled:
          type: boolean
        wallet_address:
          type: string

    Friend:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/User'
        status:
          type: string
          enum: [online, away, busy, offline]
        created_at:
          type: string
          format: date-time

    FriendRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sender:
          $ref: '#/components/schemas/User'
        receiver:
          $ref: '#/components/schemas/User'
        status:
          type: string
          enum: [pending, accepted, rejected]
        created_at:
          type: string
          format: date-time

    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        is_group:
          type: boolean
        participants:
          type: array
          items:
            $ref: '#/components/schemas/User'
        last_message:
          $ref: '#/components/schemas/Message'
        unread_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        sender:
          $ref: '#/components/schemas/User'
        content:
          type: string
        encrypted_content:
          type: string
        message_type:
          type: string
          enum: [text, image, file, voice, video]
        metadata:
          type: object
          properties:
            file_url:
              type: string
            file_name:
              type: string
            file_size:
              type: integer
            duration:
              type: number
              description: Duration in seconds for voice/video
            thumbnail:
              type: string
            width:
              type: integer
            height:
              type: integer
        is_edited:
          type: boolean
        read_by:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        icon_url:
          type: string
          format: uri
        owner_id:
          type: string
          format: uuid
        member_count:
          type: integer
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time

    Channel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [text, voice, announcement]
        category_id:
          type: string
          format: uuid
        position:
          type: integer
        created_at:
          type: string
          format: date-time

    Forum:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        icon_url:
          type: string
          format: uri
        member_count:
          type: integer
        thread_count:
          type: integer
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time

    Thread:
      type: object
      properties:
        id:
          type: string
          format: uuid
        forum_id:
          type: string
          format: uuid
        author:
          $ref: '#/components/schemas/User'
        title:
          type: string
        content:
          type: string
        flair:
          type: string
        upvotes:
          type: integer
        downvotes:
          type: integer
        score:
          type: integer
        comment_count:
          type: integer
        is_pinned:
          type: boolean
        is_locked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

    CallRoom:
      type: object
      properties:
        room_id:
          type: string
          format: uuid
        call_type:
          type: string
          enum: [audio, video]
        participants:
          type: array
          items:
            $ref: '#/components/schemas/CallParticipant'
        created_at:
          type: string
          format: date-time

    CallParticipant:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        is_muted:
          type: boolean
        is_video_enabled:
          type: boolean
        joined_at:
          type: string
          format: date-time

    # ============================================
    # NEW SCHEMAS FOR 2FA, OAuth, PM, Calendar, etc.
    # ============================================

    UserSettings:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto]
        accent_color:
          type: string
        compact_mode:
          type: boolean
        font_size:
          type: string
          enum: [small, medium, large]
        push_notifications:
          type: boolean
        email_notifications:
          type: boolean
        dm_notifications:
          type: boolean
        profile_visibility:
          type: string
          enum: [public, friends, private]
        show_online_status:
          type: boolean
        allow_friend_requests:
          type: boolean
        locale:
          type: string

    PMFolder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [inbox, sent, drafts, trash, custom]
        message_count:
          type: integer
        unread_count:
          type: integer
        created_at:
          type: string
          format: date-time

    PrivateMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject:
          type: string
        body:
          type: string
        sender:
          $ref: '#/components/schemas/User'
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/User'
        folder_id:
          type: string
          format: uuid
        is_read:
          type: boolean
        reply_to_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CalendarEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        all_day:
          type: boolean
        location:
          type: string
        visibility:
          type: string
          enum: [public, private, friends]
        category:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            color:
              type: string
        repeats:
          type: string
          enum: [none, daily, weekly, monthly, yearly]
        rsvp_count:
          type: object
          properties:
            going:
              type: integer
            maybe:
              type: integer
            not_going:
              type: integer
        my_rsvp:
          type: string
          enum: [going, maybe, not_going]
          nullable: true
        created_by:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time

    VoiceMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        duration:
          type: number
          description: Duration in seconds
        waveform:
          type: array
          items:
            type: number
          description: Amplitude values for visualization
        file_size:
          type: integer
        mime_type:
          type: string
        created_at:
          type: string
          format: date-time

    Achievement:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon_url:
          type: string
          format: uri
        category:
          type: string
        rarity:
          type: string
          enum: [common, uncommon, rare, epic, legendary]
        xp_reward:
          type: integer
        coin_reward:
          type: integer
        is_unlocked:
          type: boolean
        unlocked_at:
          type: string
          format: date-time
          nullable: true
        progress:
          type: number
          description: Progress towards achievement (0-100)
        requirement:
          type: string

    Quest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [daily, weekly, special]
        status:
          type: string
          enum: [available, active, completed, expired]
        progress:
          type: integer
        goal:
          type: integer
        xp_reward:
          type: integer
        coin_reward:
          type: integer
        expires_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    E2EEKeyRegistration:
      type: object
      required: [identity_key, signed_prekey, prekeys]
      properties:
        device_id:
          type: string
          description: Unique device identifier
        identity_key:
          type: string
          format: base64
          description: Public identity key
        signed_prekey:
          type: object
          properties:
            key_id:
              type: string
            public_key:
              type: string
              format: base64
            signature:
              type: string
              format: base64
        prekeys:
          type: array
          items:
            type: object
            properties:
              key_id:
                type: string
              public_key:
                type: string
                format: base64

    PrekeyBundle:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        device_id:
          type: string
        identity_key:
          type: string
          format: base64
        signed_prekey:
          type: object
          properties:
            key_id:
              type: string
            public_key:
              type: string
              format: base64
            signature:
              type: string
              format: base64
        one_time_prekey:
          type: object
          nullable: true
          properties:
            key_id:
              type: string
            public_key:
              type: string
              format: base64

  # WebRTC Endpoints
  /calls/create:
    post:
      tags: [Calls]
      summary: Create a new call room
      operationId: createCallRoom
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_user_id, call_type]
              properties:
                target_user_id:
                  type: string
                  format: uuid
                call_type:
                  type: string
                  enum: [audio, video]
      responses:
        '201':
          description: Call room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRoom'

  /calls/{room_id}:
    get:
      tags: [Calls]
      summary: Get call room details
      operationId: getCallRoom
      security:
        - BearerAuth: []
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Call room details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRoom'

  /calls/{room_id}/join:
    post:
      tags: [Calls]
      summary: Join an existing call
      operationId: joinCall
      security:
        - BearerAuth: []
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully joined call
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallRoom'

  /calls/{room_id}/leave:
    post:
      tags: [Calls]
      summary: Leave a call
      operationId: leaveCall
      security:
        - BearerAuth: []
      parameters:
        - name: room_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully left call

  # ============================================
  # LEADERBOARDS & GAMIFICATION
  # ============================================

  /leaderboard:
    get:
      tags: [Leaderboard]
      summary: Global leaderboard (all categories)
      operationId: globalLeaderboard
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [xp, level, karma, streak, messages, posts, friends]
          description: Metric to rank users (default xp)
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, alltime]
          description: Time window for scores (default alltime)
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Leaderboard entries with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        userId:
                          type: string
                          format: uuid
                        username:
                          type: string
                        displayName:
                          type: string
                        avatarUrl:
                          type: string
                        level:
                          type: integer
                        value:
                          type: number
                        isOnline:
                          type: boolean
                        isPremium:
                          type: boolean
                        isVerified:
                          type: boolean
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  currentUser:
                    type: object
                    nullable: true
                    properties:
                      rank:
                        type: integer
                      value:
                        type: number
                      userId:
                        type: string
                        format: uuid

  /users/leaderboard:
    get:
      tags: [Leaderboard]
      summary: Legacy users leaderboard
      operationId: usersLeaderboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Leaderboard data

  /gamification/leaderboard/{category}:
    get:
      tags: [Leaderboard]
      summary: Gamification leaderboard by category
      operationId: gamificationLeaderboard
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
            enum: [xp, level, karma, streak, messages, posts]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Leaderboard entries

  # ============================================
  # MYBB PRESENCE & REFERRALS
  # ============================================

  /presence/online:
    get:
      tags: [Presence]
      summary: List online users
      operationId: presenceOnline
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Online users and counts

  /presence/heartbeat:
    post:
      tags: [Presence]
      summary: Send heartbeat to stay online
      operationId: presenceHeartbeat
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Heartbeat acknowledged

  /presence/stats:
    get:
      tags: [Presence]
      summary: Presence statistics
      operationId: presenceStats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Presence metrics

  /members:
    get:
      tags: [Members]
      summary: List members (MyBB)
      operationId: listMembers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Members list

  /members/{id}:
    get:
      tags: [Members]
      summary: Get member by ID
      operationId: getMember
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member details

  /referrals/stats:
    get:
      tags: [Referrals]
      summary: Referral stats
      operationId: referralStats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Referral stats

  /referrals/leaderboard:
    get:
      tags: [Referrals]
      summary: Referral leaderboard
      operationId: referralLeaderboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Referral leaderboard

  /referrals/rewards:
    get:
      tags: [Referrals]
      summary: List referral reward tiers
      operationId: referralRewardTiers
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Reward tiers

  /referrals/rewards/{id}/claim:
    post:
      tags: [Referrals]
      summary: Claim referral reward
      operationId: referralClaimReward
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reward claimed

  /referrals/validate/{code}:
    get:
      tags: [Referrals]
      summary: Validate referral code
      operationId: referralValidate
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Code valid/invalid

  /referrals/apply:
    post:
      tags: [Referrals]
      summary: Apply referral code
      operationId: referralApply
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Code applied

  # ============================================
  # E2EE ENDPOINTS (v0.9.0+)
  # ============================================

  /e2ee/keys:
    post:
      tags: [E2EE]
      summary: Register E2EE keys for a device
      description: |
        Register identity key, signed prekey, and one-time prekeys for E2EE.
        Must be called once per device during E2EE setup.
      operationId: registerE2EEKeys
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/E2EEKeyRegistration'
      responses:
        '201':
          description: Keys registered successfully
        '400':
          description: Invalid key format

  /e2ee/keys/{device_id}:
    delete:
      tags: [E2EE]
      summary: Revoke keys for a device
      description: |
        Revoke all E2EE keys for a specific device.
        Used when logging out a device or after security compromise.
      operationId: revokeDeviceKeys
      security:
        - BearerAuth: []
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Keys revoked successfully
        '404':
          description: Device not found

  /e2ee/bundle/{user_id}:
    get:
      tags: [E2EE]
      summary: Get prekey bundle for a user
      description: |
        Retrieve the prekey bundle needed to establish an encrypted session with a user.
        Returns identity key, signed prekey, and optionally a one-time prekey.
      operationId: getPrekeyBundle
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prekey bundle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrekeyBundle'
        '404':
          description: User not found or no keys registered

  /e2ee/prekeys:
    post:
      tags: [E2EE]
      summary: Upload additional one-time prekeys
      description: |
        Upload additional one-time prekeys when running low.
        Should be called periodically to maintain availability.
      operationId: uploadPrekeys
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prekeys]
              properties:
                prekeys:
                  type: array
                  items:
                    type: object
                    properties:
                      key_id:
                        type: string
                      public_key:
                        type: string
                        format: base64
      responses:
        '200':
          description: Prekeys uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /e2ee/prekeys/count:
    get:
      tags: [E2EE]
      summary: Get remaining prekey count
      description: Check how many one-time prekeys are available for this device.
      operationId: getPrekeyCount
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Prekey count
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

  /e2ee/devices:
    get:
      tags: [E2EE]
      summary: List registered devices
      description: Get all devices with registered E2EE keys for the current user.
      operationId: listDevices
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    device_id:
                      type: string
                    created_at:
                      type: string
                      format: date-time

  # ============================================
  # PRESENCE ENDPOINTS
  # ============================================

  /presence/status:
    put:
      tags: [Presence]
      summary: Update online status
      description: Update the current user's online status (online, away, dnd, invisible).
      operationId: updatePresenceStatus
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [online, away, dnd, invisible]
                custom_status:
                  type: string
                  maxLength: 128
      responses:
        '200':
          description: Status updated

security:
  - BearerAuth: []
  - CookieAuth: []
