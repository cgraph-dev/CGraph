openapi: 3.1.0
info:
  title: CGraph API
  description: |
    CGraph is a modern communication platform combining messaging, groups, and forums
    with end-to-end encryption and Web3 wallet integration.
    
    ## Authentication
    
    Authentication uses HTTP-only cookies for enhanced security:
    - Access tokens are set as HTTP-only cookies (15 min expiry)
    - Refresh tokens are set as HTTP-only cookies (7 day expiry)
    - All API requests automatically include cookies via `withCredentials: true`
    
    For WebSocket connections, a session token is provided via the auth endpoints
    and passed as a query parameter.
    
    Legacy Bearer token authentication is still supported for backwards compatibility:
    ```
    Authorization: Bearer <your-token>
    ```
    
    Obtain tokens via `/api/v1/auth/login` or `/api/v1/auth/register`.
    
    ## End-to-End Encryption (v0.9.0+)
    
    CGraph implements Signal Protocol-inspired E2EE:
    - X3DH for initial key agreement
    - Double Ratchet for forward secrecy
    - AES-256-GCM for message encryption
    
    See the E2EE endpoints under `/api/v1/e2ee/*` for key management.
    
    ## Rate Limiting
    
    - Default: 100 requests/minute per IP
    - Authenticated: 300 requests/minute per user
    - Upload endpoints: 10 requests/minute
    
    Rate limit headers are included in all responses:
    - `X-RateLimit-Limit`
    - `X-RateLimit-Remaining`
    - `X-RateLimit-Reset`
    
  version: 0.9.1
  contact:
    name: CGraph Support
    email: support@cgraph.org
    url: https://cgraph.org
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.cgraph.org/api/v1
    description: Production server
  - url: https://staging-api.cgraph.org/api/v1
    description: Staging server
  - url: http://localhost:4000/api/v1
    description: Local development

tags:
  - name: Authentication
    description: User registration, login, and session management
  - name: Two-Factor Authentication
    description: TOTP-based 2FA setup, verification, and backup codes
  - name: OAuth
    description: OAuth provider authentication (Google, Apple, etc.)
  - name: Users
    description: User profiles and settings
  - name: Settings
    description: User preferences, notifications, privacy settings
  - name: Friends
    description: Friend requests and relationships
  - name: Conversations
    description: Direct messaging between users
  - name: Messages
    description: Message operations within conversations
  - name: Private Messages
    description: MyBB-style private messaging with folders and drafts
  - name: Groups
    description: Group creation and management
  - name: Channels
    description: Channels within groups
  - name: Forums
    description: Forum communities
  - name: Threads
    description: Forum threads and posts
  - name: Calls
    description: WebRTC voice and video calls
  - name: Voice Messages
    description: Audio message recording and playback
  - name: E2EE
    description: End-to-End Encryption key management (v0.9.0+)
  - name: Presence
    description: Online status and presence tracking
  - name: Leaderboard
    description: Global and category leaderboards
  - name: Gamification
    description: XP, achievements, quests, titles, and rewards
  - name: Calendar
    description: Events, categories, and RSVPs
  - name: Referrals
    description: Referral codes, rewards, and validation
  - name: Members
    description: Member discovery and MyBB profile endpoints
  - name: Admin
    description: Administrative endpoints (requires admin role)

paths:
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                username:
                  type: string
                  minLength: 3
                  maxLength: 32
                  pattern: '^[a-zA-Z0-9_]+$'
                  example: johndoe
                password:
                  type: string
                  minLength: 8
                  example: SecurePass123!
                display_name:
                  type: string
                  maxLength: 64
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and invalidate tokens
      operationId: logoutUser
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Logged out successfully

  # ============================================
  # TWO-FACTOR AUTHENTICATION (2FA)
  # ============================================

  /auth/2fa/status:
    get:
      tags: [Two-Factor Authentication]
      summary: Get 2FA status for current user
      operationId: get2FAStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 2FA status
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  setup_at:
                    type: string
                    format: date-time
                  backup_codes_remaining:
                    type: integer

  /auth/2fa/setup:
    post:
      tags: [Two-Factor Authentication]
      summary: Begin 2FA setup - generates secret and QR code
      operationId: setup2FA
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 2FA setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    description: Base32-encoded TOTP secret
                  qr_code_url:
                    type: string
                    format: uri
                    description: Data URL for QR code image
                  otpauth_url:
                    type: string
                    description: otpauth:// URL for authenticator apps

  /auth/2fa/enable:
    post:
      tags: [Two-Factor Authentication]
      summary: Enable 2FA after verifying TOTP code
      operationId: enable2FA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit TOTP code from authenticator app
      responses:
        '200':
          description: 2FA enabled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  backup_codes:
                    type: array
                    items:
                      type: string
                    description: One-time backup codes (show only once)
        '401':
          description: Invalid TOTP code

  /auth/2fa/verify:
    post:
      tags: [Two-Factor Authentication]
      summary: Verify 2FA code during login
      operationId: verify2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, session_token]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                session_token:
                  type: string
                  description: Temporary token from login response when 2FA is required
      responses:
        '200':
          description: 2FA verified, full auth tokens returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid code or session

  /auth/2fa/disable:
    post:
      tags: [Two-Factor Authentication]
      summary: Disable 2FA for current user
      operationId: disable2FA
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  description: Current password for verification
      responses:
        '200':
          description: 2FA disabled
        '401':
          description: Invalid password

  /auth/2fa/backup-codes:
    post:
      tags: [Two-Factor Authentication]
      summary: Regenerate backup codes
      operationId: regenerateBackupCodes
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: New backup codes generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  backup_codes:
                    type: array
                    items:
                      type: string

  /auth/2fa/backup-codes/use:
    post:
      tags: [Two-Factor Authentication]
      summary: Use a backup code for 2FA verification
      operationId: useBackupCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, session_token]
              properties:
                code:
                  type: string
                  description: One-time backup code
                session_token:
                  type: string
      responses:
        '200':
          description: Backup code accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid backup code

  # ============================================
  # OAUTH AUTHENTICATION
  # ============================================

  /auth/oauth/providers:
    get:
      tags: [OAuth]
      summary: List available OAuth providers
      operationId: listOAuthProviders
      responses:
        '200':
          description: Available OAuth providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          enum: [google, apple, github, discord]
                        name:
                          type: string
                        icon_url:
                          type: string
                        enabled:
                          type: boolean

  /auth/oauth/{provider}:
    get:
      tags: [OAuth]
      summary: Initiate OAuth authorization flow
      operationId: oauthAuthorize
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple, github, discord]
        - name: redirect_uri
          in: query
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to OAuth provider

  /auth/oauth/{provider}/callback:
    get:
      tags: [OAuth]
      summary: OAuth callback handler (web)
      operationId: oauthCallback
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OAuth authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
    post:
      tags: [OAuth]
      summary: OAuth callback handler (Apple uses POST with form_post)
      operationId: oauthCallbackPost
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                code:
                  type: string
                id_token:
                  type: string
                state:
                  type: string
      responses:
        '200':
          description: OAuth authentication successful

  /auth/oauth/{provider}/mobile:
    post:
      tags: [OAuth]
      summary: Verify OAuth tokens from mobile native SDKs
      operationId: oauthMobile
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [google, apple]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: ID token from native SDK
                access_token:
                  type: string
                  description: Access token (optional, for some providers)
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/oauth/{provider}/link:
    post:
      tags: [OAuth]
      summary: Link OAuth provider to existing account
      operationId: linkOAuthProvider
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider linked
    delete:
      tags: [OAuth]
      summary: Unlink OAuth provider from account
      operationId: unlinkOAuthProvider
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider unlinked

  /auth/wallet/challenge:
    post:
      tags: [Authentication]
      summary: Request Web3 wallet authentication challenge
      operationId: walletChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address]
              properties:
                wallet_address:
                  type: string
                  pattern: '^0x[a-fA-F0-9]{40}$'
                  example: '0x742d35Cc6634C0532925a3b844Bc9e7595f1Bd00'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                  expires_at:
                    type: string
                    format: date-time

  /auth/wallet/verify:
    post:
      tags: [Authentication]
      summary: Verify Web3 wallet signature
      operationId: walletVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet_address, signature, challenge]
              properties:
                wallet_address:
                  type: string
                signature:
                  type: string
                challenge:
                  type: string
      responses:
        '200':
          description: Wallet verified, user authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [Users]
      summary: Update current user profile
      operationId: updateCurrentUser
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                bio:
                  type: string
                avatar_url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/{user_id}:
    get:
      tags: [Users]
      summary: Get user by ID
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

  # ============================================
  # SETTINGS
  # ============================================

  /settings:
    get:
      tags: [Settings]
      summary: Get all user settings
      operationId: getSettings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettings'
    put:
      tags: [Settings]
      summary: Update user settings
      operationId: updateSettings
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettings'
      responses:
        '200':
          description: Settings updated

  /settings/notifications:
    put:
      tags: [Settings]
      summary: Update notification preferences
      operationId: updateNotificationSettings
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                push_enabled:
                  type: boolean
                email_enabled:
                  type: boolean
                dm_notifications:
                  type: boolean
                mention_notifications:
                  type: boolean
                friend_request_notifications:
                  type: boolean
                digest_frequency:
                  type: string
                  enum: [none, daily, weekly]
      responses:
        '200':
          description: Notification settings updated

  /settings/privacy:
    put:
      tags: [Settings]
      summary: Update privacy settings
      operationId: updatePrivacySettings
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_visibility:
                  type: string
                  enum: [public, friends, private]
                show_online_status:
                  type: boolean
                allow_friend_requests:
                  type: boolean
                allow_dms_from:
                  type: string
                  enum: [everyone, friends, none]
                show_activity_status:
                  type: boolean
      responses:
        '200':
          description: Privacy settings updated

  /settings/appearance:
    put:
      tags: [Settings]
      summary: Update appearance settings
      operationId: updateAppearanceSettings
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                theme:
                  type: string
                  enum: [light, dark, auto]
                accent_color:
                  type: string
                compact_mode:
                  type: boolean
                font_size:
                  type: string
                  enum: [small, medium, large]
      responses:
        '200':
          description: Appearance settings updated

  # ============================================
  # PRIVATE MESSAGES (PM) - MyBB Feature
  # ============================================

  /pm/folders:
    get:
      tags: [Private Messages]
      summary: List PM folders
      operationId: listPMFolders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of PM folders
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PMFolder'
    post:
      tags: [Private Messages]
      summary: Create a custom PM folder
      operationId: createPMFolder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 50
      responses:
        '201':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PMFolder'

  /pm/folders/{id}:
    put:
      tags: [Private Messages]
      summary: Rename a PM folder
      operationId: updatePMFolder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Folder updated
    delete:
      tags: [Private Messages]
      summary: Delete a PM folder
      operationId: deletePMFolder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Folder deleted

  /pm/messages:
    get:
      tags: [Private Messages]
      summary: List private messages
      operationId: listPMs
      security:
        - BearerAuth: []
      parameters:
        - name: folder_id
          in: query
          schema:
            type: string
            format: uuid
        - name: unread_only
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: List of private messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PrivateMessage'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Private Messages]
      summary: Send a private message
      operationId: sendPM
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient_ids, subject, body]
              properties:
                recipient_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                  maxItems: 10
                subject:
                  type: string
                  maxLength: 200
                body:
                  type: string
                  maxLength: 10000
                reply_to_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateMessage'

  /pm/messages/{id}:
    get:
      tags: [Private Messages]
      summary: Get a private message
      operationId: getPM
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Private message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivateMessage'
    delete:
      tags: [Private Messages]
      summary: Delete a private message
      operationId: deletePM
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Message deleted

  /pm/messages/{id}/read:
    post:
      tags: [Private Messages]
      summary: Mark message as read
      operationId: markPMRead
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marked as read

  /pm/messages/{id}/move:
    post:
      tags: [Private Messages]
      summary: Move message to folder
      operationId: movePMToFolder
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [folder_id]
              properties:
                folder_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Message moved

  /pm/drafts:
    get:
      tags: [Private Messages]
      summary: List PM drafts
      operationId: listPMDrafts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of drafts
    post:
      tags: [Private Messages]
      summary: Save a PM draft
      operationId: savePMDraft
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recipient_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                subject:
                  type: string
                body:
                  type: string
      responses:
        '201':
          description: Draft saved

  /pm/drafts/{id}/send:
    post:
      tags: [Private Messages]
      summary: Send a draft
      operationId: sendPMDraft
      security:
        - BearerAuth: []
      parameters:
